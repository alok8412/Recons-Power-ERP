<!doctype html>
<html>
<head>
  <title>EFP ERP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="authBox" class="auth">
  <h2>ERP Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="app">

  <aside class="sidebar">
    <h2>EFP ERP</h2>
    <li onclick="loadPage('dashboard')">Dashboard</li>
    <li onclick="loadPage('inventory')">Inventory</li>
    <li onclick="loadPage('sales')">Sales</li>
    <li onclick="loadPage('production')">Production</li>
  </aside>

  <div class="main">

    <div class="topbar">
      <span id="user"></span>
      <button onclick="logout()">Logout</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="page">
      <h2>Dashboard</h2>
      <div id="stats"></div>
    </div>

    <!-- INVENTORY -->
    <div id="inventory" class="page hidden">
      <h2>Inventory</h2>
      <input id="itemName" placeholder="Item">
      <input id="itemQty" type="number">
      <button onclick="addInventory()">Add</button>
      <ul id="invList"></ul>
    </div>

    <!-- SALES -->
    <div id="sales" class="page hidden">
      <h2>Sales</h2>
      <input id="cust" placeholder="Customer">
      <input id="gst" placeholder="GST">
      <input id="prod" placeholder="Product">
      <input id="qty" type="number">
      <input id="rate" type="number">
      <button onclick="addSale()">Save</button>
      <button onclick="invoice()">Invoice</button>
      <ul id="salesList"></ul>
    </div>

    <!-- PRODUCTION -->
    <div id="production" class="page hidden">
      <h2>Production</h2>
      <input id="pname" placeholder="Product">
      <button onclick="addProduction()">Add</button>
      <ul id="prodList"></ul>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
